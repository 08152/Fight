<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FULL FPS ENGINE</title>

<style>
body{margin:0;overflow:hidden;background:#87cfff}

#crosshair{
position:absolute;top:50%;left:50%;
width:10px;height:10px;
transform:translate(-50%,-50%);
z-index:10;
}
#crosshair:before,#crosshair:after{content:"";position:absolute;background:white}
#crosshair:before{width:2px;height:10px;left:4px}
#crosshair:after{width:10px;height:2px;top:4px}

#coords{
position:absolute;bottom:10px;right:10px;
color:white;font-family:Arial;font-size:13px;
background:rgba(0,0,0,0.4);
padding:6px;border-radius:6px;
white-space:pre;
}

#healthBar{
position:absolute;bottom:10px;left:10px;
width:220px;height:18px;
border:2px solid white;
background:rgba(0,0,0,0.3);
}
#healthFill{width:100%;height:100%;background:#1e90ff}

#hitmarker{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:40px;color:red;display:none;
}
</style>
</head>

<body>

<div id="crosshair"></div>
<div id="coords"></div>
<div id="healthBar"><div id="healthFill"></div></div>
<div id="hitmarker">✖</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script src="1.js"></script>
<script src="2.js"></script>
<script src="3.js"></script>

</body>
</html>
