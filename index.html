<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPS ENGINE GITHUB FIXED</title>

<style>
body{margin:0;overflow:hidden;background:#87cfff;font-family:Arial}

#crosshair{
position:absolute;top:50%;left:50%;
width:10px;height:10px;
transform:translate(-50%,-50%);
z-index:10;
}
#crosshair:before,#crosshair:after{content:"";position:absolute;background:white}
#crosshair:before{width:2px;height:10px;left:4px}
#crosshair:after{width:10px;height:2px;top:4px}

#coords{
position:absolute;bottom:10px;right:10px;
color:white;font-size:13px;
background:rgba(0,0,0,0.4);
padding:6px;border-radius:6px;
white-space:pre;
}

#chatBox{
position:absolute;bottom:50px;left:10px;
width:300px;display:none;flex-direction:column;
}

#chatLog{
background:rgba(0,0,0,0.5);
color:white;
font-size:12px;
height:120px;
overflow:auto;
padding:5px;
}

#chatInput{padding:5px;border:none;outline:none}

#hitmarker{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:40px;color:red;display:none;
}
</style>
</head>

<body>

<div id="crosshair"></div>
<div id="coords"></div>
<div id="hitmarker">✖</div>

<div id="chatBox">
<div id="chatLog"></div>
<input id="chatInput" placeholder="Command..." />
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

/* ================= SCENE ================= */

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87cfff);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,5000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff,1.2));

const sun=new THREE.DirectionalLight(0xffffff,1.5);
sun.position.set(10,20,10);
scene.add(sun);

/* ================= GROUND ================= */

const ground=new THREE.Mesh(
new THREE.PlaneGeometry(5000,5000),
new THREE.MeshStandardMaterial({color:0x228822})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

/* ================= PLAYER ================= */

const player=new THREE.Object3D();
scene.add(player);
player.add(camera);
camera.position.set(0,2,0);

let yaw=0,pitch=0;
let velY=0;
let onGround=true;

/* ================= INPUT ================= */

const keys={};

window.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()]=true;

if(e.key==="t") openChat();
if(e.code==="Space") jump();
});

window.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()]=false;
});

document.body.addEventListener("click",()=>{
document.body.requestPointerLock();
});

/* ================= CHAT ================= */

let chatOpen=false;

const chatBox=document.getElementById("chatBox");
const chatInput=document.getElementById("chatInput");
const chatLog=document.getElementById("chatLog");

function openChat(){
chatOpen=!chatOpen;
chatBox.style.display=chatOpen?"flex":"none";

if(chatOpen){
chatInput.focus();
document.exitPointerLock();
}
}

chatInput.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
handleCommand(chatInput.value);
chatInput.value="";
}
});

function log(msg){
chatLog.innerHTML+=msg+"<br>";
}

/* ================= COMMANDS ================= */

function handleCommand(cmd){

cmd=cmd.trim();

if(cmd==="/save"){
saveGame();
log("Saved ✔");
return;
}

if(cmd==="/place barrier"){
placeBarrier();
log("Barrier placed ✔");
return;
}

log("Unknown: "+cmd);
}

function saveGame(){
const blob=new Blob([document.documentElement.outerHTML],{type:"text/html"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="fps_game.html";
a.click();
}

/* ================= MOVEMENT ================= */

document.addEventListener("mousemove",(e)=>{
if(document.pointerLockElement!==document.body || chatOpen)return;

yaw-=e.movementX*0.002;
pitch-=e.movementY*0.002;

pitch=Math.max(-1.2,Math.min(1.2,pitch));

player.rotation.y=yaw;
camera.rotation.x=pitch;
});

function jump(){
if(onGround){
velY=0.25;
onGround=false;
}
}

function gravity(){
velY-=0.015;
player.position.y+=velY;

if(player.position.y<=0){
player.position.y=0;
velY=0;
onGround=true;
}
}

function move(){

let dir=new THREE.Vector3();

if(keys["w"])dir.z-=1;
if(keys["s"])dir.z+=1;
if(keys["a"])dir.x-=1;
if(keys["d"])dir.x+=1;

dir.normalize();

const forward=new THREE.Vector3(0,0,-1).applyEuler(player.rotation);
forward.y=0;forward.normalize();

const right=new THREE.Vector3().crossVectors(forward,new THREE.Vector3(0,1,0)).negate();

player.position.addScaledVector(forward,dir.z*0.15);
player.position.addScaledVector(right,dir.x*0.15);
}

/* ================= MODELS ================= */

const loader=new THREE.GLTFLoader();
let weapon=null;
let barriers=[];

/* DEBUG LOADER (GITHUB SAFE) */

loader.load("./weapon.glb",
(gltf)=>{
console.log("WEAPON LOADED");
weapon=gltf.scene;
camera.add(weapon);
weapon.position.set(0.5,-0.8,-1.2);
},
undefined,
(err)=>console.error("WEAPON ERROR",err)
);

/* fallback barrier (no GLB crash) */
function addBarrier(x,y,z){

const b=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0x444444})
);

b.position.set(x,y,z);
scene.add(b);
barriers.push(b);
}

function placeBarrier(){

const dir=new THREE.Vector3(0,0,-1).applyEuler(player.rotation);

addBarrier(
player.position.x+dir.x*3,
0,
player.position.z+dir.z*3
);
}

/* ================= ENEMIES ================= */

let enemies=[];

function addEnemy(x,y,z){
const e=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xff0000})
);

e.position.set(x,y,z);
e.health=100;
scene.add(e);
enemies.push(e);
}

addEnemy(5,1,-20);

/* ================= SHOOT ================= */

const raycaster=new THREE.Raycaster();

const shootSound=new Audio();
shootSound.src="./shoot.mp3";

function hitmarker(){
const h=document.getElementById("hitmarker");
h.style.display="block";
setTimeout(()=>h.style.display="none",100);
}

function shoot(){

raycaster.setFromCamera(new THREE.Vector2(0,0),camera);

const hits=raycaster.intersectObjects(enemies,false);

if(hits.length){

const e=hits[0].object;
e.health-=25;

hitmarker();

if(e.health<=0){
scene.remove(e);
enemies=enemies.filter(x=>x!==e);
}
}

shootSound.currentTime=0;
shootSound.play().catch(()=>{});
}

/* ================= LOOP ================= */

function animate(){
requestAnimationFrame(animate);

move();
gravity();

camera.position.y+=(2-player.position.y-camera.position.y)*0.15;

document.getElementById("coords").innerHTML=
`X:${player.position.x.toFixed(2)}
Y:${player.position.y.toFixed(2)}
Z:${player.position.z.toFixed(2)}`;

renderer.render(scene,camera);
}

animate();

/* ================= RESIZE ================= */

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>
</body>
</html>
